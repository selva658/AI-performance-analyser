<aside class="sidebar">
  <div class="logo">
    Athlete<span>IQ</span>
  </div>

  <nav>
    @for (item of menuItems; track item.label) {
      <div
        class="menu-item"
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        {{ item.label }}
      </div>
    }
  </nav>
</aside>
